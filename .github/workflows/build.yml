name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '8.4'

    - name: Build unsigned APK
      run: gradle assembleDebug

    - name: Generate keystore and sign APK
      run: |
        keytool -genkeypair -v -keystore sign.keystore \
          -storepass android -alias androiddebugkey -keypass android \
          -keyalg RSA -keysize 2048 -validity 10000 \
          -dname "CN=Debug,O=AppUninstaller,C=CN"
        jarsigner -verbose -sigalg SHA256withRSA -digestalg SHA-256 \
          -keystore sign.keystore -storepass android -keypass android \
          app/build/outputs/apk/debug/app-debug.apk androiddebugkey
        jarsigner -verify app/build/outputs/apk/debug/app-debug.apk

    - name: Upload signed APK
      uses: actions/upload-artifact@v4
      with:
        name: app-release-apk
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30
